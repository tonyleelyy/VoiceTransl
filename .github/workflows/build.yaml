name: Create Executable
on:
  push:
    tags:
      - '*'
  workflow_dispatch:
jobs:
  pyinstaller-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: App-windows
            spec: app.spec
            requirements: requirements.txt
          - os: macos-latest
            name: App-macos
            spec: app-macos.spec
            requirements: requirements-macos.txt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller
          pip install -r ${{ matrix.requirements }}

      - name: Build auxiliary executables
        run: |
          pyinstaller separate.spec --distpath .
          pyinstaller translate.spec --distpath .

      - name: Build main executable
        run: pyinstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/
